[build]
builder = "nixpacks"

[deploy]
startCommand = "python -c \"import os; port = int(os.environ.get('PORT', 8000)); import uvicorn; uvicorn.run('saju_api:app', host='0.0.0.0', port=port)\""
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
